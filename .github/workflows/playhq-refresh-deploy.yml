name: Refresh PlayHQ Data and Publish

on:
  schedule:
    # Melbourne local time (AEST):
    # - Monday 1:00am local = Sunday 3:00pm UTC
    # - Monday/Tuesday/Wednesday/Friday 3:30pm local = 5:30am UTC
    # - Monday/Tuesday/Wednesday/Friday 4:30pm–11:30pm local = 6:30am–1:30pm UTC
    - cron: '0 15 * * 0'
    - cron: '30 5 * * 1,2,3,5'
    - cron: '30 6-13 * * 1,2,3,5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh PlayHQ scores data
        env:
          PLAYHQ_API_KEY: ${{ secrets.PLAYHQ_API_KEY }}
          PLAYHQ_TENANT: bv
          PLAYHQ_CLUB_MATCH: Phoenix
        run: npm run scores:refresh

      - name: Validate PlayHQ scores data
        run: npm run scores:check

      - name: Refresh home games data
        run: npm run home-scores:refresh

      - name: Validate home games data
        run: npm run home-scores:check

      - name: Copy refreshed artifacts into public live-data
        run: |
          mkdir -p public/live-data
          cp scripts/scores-data.json public/live-data/scores.json
          cp scripts/home-games-data.json public/live-data/home-games.json

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to VentraIP via FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_PORT" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing one or more FTP secrets"
            exit 1
          fi

          FTP_REMOTE_DIR="${FTP_REMOTE_DIR:-.}"
          if [ "$FTP_REMOTE_DIR" = "public_html" ] || [ "$FTP_REMOTE_DIR" = "/public_html" ] || [[ "$FTP_REMOTE_DIR" == *"/public_html" ]]; then
            echo "FTP_REMOTE_DIR must be the document root itself (use '.'), not a nested public_html folder."
            exit 1
          fi

          lftp -c "
            set ssl:verify-certificate yes;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ftp:ssl-auth TLS;
            open -u \"$FTP_USER\",\"$FTP_PASS\" -p \"$FTP_PORT\" ftp://$FTP_HOST;
            mirror --reverse --delete --verbose public/live-data/ \"$FTP_REMOTE_DIR/live-data\";
            bye
          "
