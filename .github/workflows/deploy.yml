name: Deploy Phoenix Site

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - PlayHQ Sync
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to VentraIP via FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_PORT" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing one or more FTP secrets"
            exit 1
          fi

          FTP_REMOTE_DIR="${FTP_REMOTE_DIR:-.}"
          if [ "$FTP_REMOTE_DIR" = "public_html" ] || [ "$FTP_REMOTE_DIR" = "/public_html" ] || [[ "$FTP_REMOTE_DIR" == *"/public_html" ]]; then
            echo "FTP_REMOTE_DIR must be the document root itself (use '.'), not a nested public_html folder."
            exit 1
          fi

          lftp -c "
            set ssl:verify-certificate yes;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ftp:ssl-auth TLS;
            open -u \"$FTP_USER\",\"$FTP_PASS\" -p \"$FTP_PORT\" ftp://$FTP_HOST;
            mirror --reverse --delete --verbose --exclude-glob live-data/live-scores.json dist/ \"$FTP_REMOTE_DIR\";
            bye
          "
