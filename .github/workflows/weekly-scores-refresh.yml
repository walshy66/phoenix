name: Weekly Scores Refresh

on:
  schedule:
    # Saturday 14:05 UTC ~= Sunday 00:05 Australia/Melbourne (AEST)
    - cron: '5 14 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-weekly-games:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh weekly games artifact
        env:
          PLAYHQ_API_KEY: ${{ secrets.PLAYHQ_API_KEY }}
          PLAYHQ_TENANT: ${{ secrets.PLAYHQ_TENANT }}
          PLAYHQ_SEASON_IDS: ${{ secrets.PLAYHQ_SEASON_IDS }}
          PLAYHQ_CLUB_NAME: ${{ secrets.PLAYHQ_CLUB_NAME }}
        run: npm run scores:refresh:weekly

      - name: Commit artifact update
        run: |
          if git diff --quiet -- scripts/weekly-games-data.json; then
            echo "No weekly data changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/weekly-games-data.json
          git commit -m "chore(scores): weekly fixture refresh"
          git push
